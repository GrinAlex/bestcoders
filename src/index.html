<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English excellence</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Master English with our flexible learning packages. From group practice to individual coaching, English Excellence provides expert instruction for all levels. Apply now!"
    />

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Modern normalize -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- stylesheet -->
    <link rel="stylesheet" href="./css/styles.css" />

    <!-- Google fonts -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      media="print"
      onload="this.media = 'all'"
    />

    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      />
    </noscript>

    <!-- preload images -->
    <!-- Mobile (до 430px) -->
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="./img/hero/hero-mobile.jpg"
      imagesrcset="./img/hero/hero-mobile.jpg 1x, ./img/hero/hero-mobile@2x.jpg 2x"
      media="(max-width: 430px)"
    />

    <!-- Tablet (від 431px до 820px) -->
    <link
      rel="preload"
      as="image"
      href="./img/hero/hero-tablet.jpg"
      imagesrcset="./img/hero/hero-tablet.jpg 1x, ./img/hero/hero-tablet@2x.jpg 2x"
      media="(min-width: 431px) and (max-width: 820px)"
    />

    <!-- Desktop (понад 820px) -->
    <link
      rel="preload"
      as="image"
      fetchpriority="high"
      href="./img/hero/hero-desktop.jpg"
      imagesrcset="./img/hero/hero-desktop.jpg 1x, ./img/hero/hero-desktop@2x.jpg 2x"
      media="(min-width: 821px)"
    />
  </head>
  <body>
    <load src="./partials/header.html" icon-path="img/sprite.svg" />

    <main>
      <!-- Loads the specified .html file -->
      <load src="./partials/hero.html" />
      <load src="./partials/about.html" />
      <load src="./partials/lessons.html" />
      <load src="./partials/proposal.html" icon-path="img/sprite.svg" />
      <load src="./partials/teachers.html" />
      <load src="./partials/application.html" />
      <load src="./partials/reviews.html" />
    </main>

    <load src="./partials/footer.html" icon-path="img/sprite.svg" />

    <script type="module" src="./main.js"></script>
  </body>
</html>
